name: Build Android AAB

# Roda manualmente: aba "Actions" -> "Build Android AAB" -> "Run workflow".
# Precisa de 2 secrets no repo: KEYSTORE_BASE64 e KEYSTORE_PASSWORD.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes do SDK
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Reconstruir a chave de assinatura (a partir do secret)
        working-directory: twa
        run: echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Gerar o pacote (.aab)
        working-directory: twa
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Assinar o pacote
        working-directory: twa
        run: |
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            app/build/outputs/bundle/release/app-release.aab marcaula
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Publicar o .aab como artefato para download
        uses: actions/upload-artifact@v4
        with:
          name: marcaula-android-aab
          path: twa/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
